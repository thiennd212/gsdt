{{/* GSDT — Kubernetes Secret for sensitive configuration (Vault credentials)
     In production, prefer External Secrets Operator over this fallback template. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gsdt.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gsdt.labels" . | nindent 4 }}
  annotations:
    # Prefer External Secrets Operator in production — this is a fallback
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  Vault__RoleId: {{ .Values.vault.roleId | default "" | quote }}
  Vault__SecretId: {{ .Values.vault.secretId | default "" | quote }}
