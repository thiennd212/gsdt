{{/* GSDT — Kubernetes NetworkPolicy */}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gsdt.fullname" . }}-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gsdt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gsdt.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow inbound only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

    # Allow inbound from Prometheus scraper (same namespace, monitoring label)
    {{- if .Values.networkPolicy.allowPrometheus }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}

  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow outbound to SQL Server
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dataNamespace }}
      ports:
        - protocol: TCP
          port: 1433

    # Allow outbound to Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dataNamespace }}
      ports:
        - protocol: TCP
          port: 6379

    # Allow outbound to RabbitMQ / AMQP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dataNamespace }}
      ports:
        - protocol: TCP
          port: 5672

    # Allow outbound HTTPS (external APIs, Keycloak, OTEL collector)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 4317   # OTEL gRPC
        - protocol: TCP
          port: 4318   # OTEL HTTP
{{- end }}
