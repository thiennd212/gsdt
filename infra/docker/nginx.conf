worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # Hide nginx version from Server header (QĐ742 §4.1 — no version exposure)
    server_tokens off;

    # Docker internal DNS — re-resolves service name to all replica IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    keepalive_timeout           65s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    server {
        listen 80;

        # Security headers (CSP, HSTS, XSS protection)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:* http://host.docker.internal:*; frame-ancestors 'none';" always;

        location / {
            # Variable forces nginx to use resolver on every request
            # so it picks up new replicas added via --scale api=N
            set $upstream http://api:8080;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
