asyncapi: 3.0.0
info:
  title: GSDT Domain Events
  version: 1.0.0
  description: |
    AsyncAPI specification for GSDT domain events that cross module boundaries.
    Events are dispatched via Outbox pattern → MassTransit → RabbitMQ.
    IExternalDomainEvent types are published to MassTransit exchanges.
    IInternalDomainEvent types are consumed in-process via MediatR but documented here
    when they trigger cross-module side effects (e.g., Audit logging, Notifications).
  contact:
    name: AEQUITAS Engineering
  license:
    name: Proprietary

servers:
  development:
    host: localhost:5672
    protocol: amqp
    description: Local RabbitMQ (Docker Compose)
  staging:
    host: rabbitmq.staging.internal:5672
    protocol: amqp
    description: Staging RabbitMQ cluster
  production:
    host: rabbitmq.prod.internal:5672
    protocol: amqp
    description: Production RabbitMQ cluster

defaultContentType: application/json

channels:
  # ── External Domain Events (Outbox → MassTransit) ──────────────────────
  notification-sent:
    address: GSDT.Notifications.Domain.Events:NotificationSentEvent
    description: Published after a notification is successfully sent via any channel.
    messages:
      notificationSent:
        $ref: '#/components/messages/NotificationSentEvent'

  # ── Internal Domain Events (MediatR in-process, cross-module consumers) ─
  case-created:
    address: GSDT.Cases.Domain.Events:CaseCreatedEvent
    description: Raised when a new case is created. Consumed by Notifications (sends confirmation) and Audit (logs event).
    messages:
      caseCreated:
        $ref: '#/components/messages/CaseCreatedEvent'

  case-submitted:
    address: GSDT.Cases.Domain.Events:CaseSubmittedEvent
    description: Raised when a case is submitted for processing.
    messages:
      caseSubmitted:
        $ref: '#/components/messages/CaseSubmittedEvent'

  case-assigned:
    address: GSDT.Cases.Domain.Events:CaseAssignedEvent
    description: Raised when a case is assigned to a handler.
    messages:
      caseAssigned:
        $ref: '#/components/messages/CaseAssignedEvent'

  case-approved:
    address: GSDT.Cases.Domain.Events:CaseApprovedEvent
    description: Raised when a case is approved.
    messages:
      caseApproved:
        $ref: '#/components/messages/CaseApprovedEvent'

  case-rejected:
    address: GSDT.Cases.Domain.Events:CaseRejectedEvent
    description: Raised when a case is rejected.
    messages:
      caseRejected:
        $ref: '#/components/messages/CaseRejectedEvent'

  case-closed:
    address: GSDT.Cases.Domain.Events:CaseClosedEvent
    description: Raised when a case is closed.
    messages:
      caseClosed:
        $ref: '#/components/messages/CaseClosedEvent'

  file-uploaded:
    address: GSDT.Files.Domain.Events:FileUploadedEvent
    description: Raised after file passes ClamAV scan and becomes Available.
    messages:
      fileUploaded:
        $ref: '#/components/messages/FileUploadedEvent'

  file-quarantined:
    address: GSDT.Files.Domain.Events:FileQuarantinedEvent
    description: Raised when a file is rejected by ClamAV virus scan.
    messages:
      fileQuarantined:
        $ref: '#/components/messages/FileQuarantinedEvent'

  sla-breached:
    address: GSDT.Workflow.Domain.Events:SlaBreachedEvent
    description: Raised when a workflow instance exceeds its SLA time limit.
    messages:
      slaBreached:
        $ref: '#/components/messages/SlaBreachedEvent'

components:
  messages:
    NotificationSentEvent:
      name: NotificationSentEvent
      title: Notification Sent
      summary: Published after notification delivery (IExternalDomainEvent — via Outbox+MassTransit)
      contentType: application/json
      payload:
        $ref: '#/components/schemas/NotificationSentEvent'

    CaseCreatedEvent:
      name: CaseCreatedEvent
      title: Case Created
      summary: New case created in Cases module (IInternalDomainEvent — MediatR)
      payload:
        $ref: '#/components/schemas/CaseCreatedEvent'

    CaseSubmittedEvent:
      name: CaseSubmittedEvent
      title: Case Submitted
      payload:
        $ref: '#/components/schemas/CaseSubmittedEvent'

    CaseAssignedEvent:
      name: CaseAssignedEvent
      title: Case Assigned
      payload:
        $ref: '#/components/schemas/CaseAssignedEvent'

    CaseApprovedEvent:
      name: CaseApprovedEvent
      title: Case Approved
      payload:
        $ref: '#/components/schemas/CaseApprovedEvent'

    CaseRejectedEvent:
      name: CaseRejectedEvent
      title: Case Rejected
      payload:
        $ref: '#/components/schemas/CaseRejectedEvent'

    CaseClosedEvent:
      name: CaseClosedEvent
      title: Case Closed
      payload:
        $ref: '#/components/schemas/CaseClosedEvent'

    FileUploadedEvent:
      name: FileUploadedEvent
      title: File Uploaded
      payload:
        $ref: '#/components/schemas/FileUploadedEvent'

    FileQuarantinedEvent:
      name: FileQuarantinedEvent
      title: File Quarantined
      payload:
        $ref: '#/components/schemas/FileQuarantinedEvent'

    SlaBreachedEvent:
      name: SlaBreachedEvent
      title: SLA Breached
      payload:
        $ref: '#/components/schemas/SlaBreachedEvent'

  schemas:
    NotificationSentEvent:
      type: object
      required: [NotificationId, TenantId, RecipientUserId, Channel, EventId, OccurredAt]
      properties:
        NotificationId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        RecipientUserId:
          type: string
          format: uuid
        Channel:
          type: string
          enum: [Email, Sms, InApp]
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseCreatedEvent:
      type: object
      required: [CaseId, TenantId, CaseNumber, TrackingCode, CreatedBy, EventId, OccurredAt]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        CaseNumber:
          type: string
          description: Human-readable case reference (e.g., CASE-2026-001)
        TrackingCode:
          type: string
          description: Public tracking code for citizens
        CreatedBy:
          type: string
          format: uuid
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseSubmittedEvent:
      type: object
      required: [CaseId, TenantId, SubmittedBy]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        SubmittedBy:
          type: string
          format: uuid
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseAssignedEvent:
      type: object
      required: [CaseId, TenantId, AssigneeId, Department]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        AssigneeId:
          type: string
          format: uuid
        Department:
          type: string
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseApprovedEvent:
      type: object
      required: [CaseId, TenantId, Reason, ApprovedBy]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        Reason:
          type: string
        ApprovedBy:
          type: string
          format: uuid
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseRejectedEvent:
      type: object
      required: [CaseId, TenantId, Reason, RejectedBy]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        Reason:
          type: string
        RejectedBy:
          type: string
          format: uuid
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    CaseClosedEvent:
      type: object
      required: [CaseId, TenantId, ClosedBy]
      properties:
        CaseId:
          type: string
          format: uuid
        TenantId:
          type: string
          format: uuid
        ClosedBy:
          type: string
          format: uuid
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    FileUploadedEvent:
      type: object
      required: [FileId, TenantId, OriginalFileName, SizeBytes]
      properties:
        FileId:
          type: string
          format: uuid
          description: Strongly-typed FileId value object — serializes as UUID via JsonConverter
        TenantId:
          type: string
          format: uuid
        OriginalFileName:
          type: string
        SizeBytes:
          type: integer
          format: int64
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    FileQuarantinedEvent:
      type: object
      required: [FileId, TenantId, OriginalFileName]
      properties:
        FileId:
          type: string
          format: uuid
          description: Strongly-typed FileId value object — serializes as UUID via JsonConverter
        TenantId:
          type: string
          format: uuid
        OriginalFileName:
          type: string
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time

    SlaBreachedEvent:
      type: object
      required: [InstanceId, CurrentStateId, DefinitionId, TenantId]
      properties:
        InstanceId:
          type: string
          format: uuid
        CurrentStateId:
          type: string
          format: uuid
        DefinitionId:
          type: string
          format: uuid
        TenantId:
          type: string
          description: Tenant identifier (string, not UUID — uses string key in workflow context)
        StateEnteredAt:
          type: string
          format: date-time
        ElapsedHours:
          type: integer
          description: Elapsed hours since state entry (C# int)
        EventId:
          type: string
          format: uuid
        OccurredAt:
          type: string
          format: date-time
